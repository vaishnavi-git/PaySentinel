spring.application.name=payroll-audit-api

# Database - H2 for dev, swap to Oracle/PostgreSQL for prod
spring.datasource.url=jdbc:h2:mem:payrollauditdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=payroll-audit-super-secret-key-minimum-256-bits-long-for-hs256
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.com.payrollaudit=INFO
logging.level.org.springframework.security=WARN

# Server
server.port=8080
